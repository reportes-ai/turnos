<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GesturnoS v6 — Ley 40 Horas 2026 (Optimizador Total)</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0d1117;--paper:#f4f1eb;--rust:#c0392b;--gold:#b8860b;--slate:#2c3e50;--muted:#6c757d;--line:#d4c9b0;--surface:#fffef9;--success:#27ae60;--warn:#e67e22;--danger:#c0392b;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:var(--ink);color:var(--paper);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:22px 20px;border-bottom:1px solid #2d3748;font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.logo span{display:block;font-size:10px;color:#6c757d;font-weight:400;margin-top:4px}
.nav{padding:14px 0;flex:1}
.nav-label{padding:8px 20px;font-size:10px;color:#4a5568;text-transform:uppercase;letter-spacing:2px;font-weight:600}
.nav-btn{width:100%;padding:9px 20px;background:none;border:none;color:#94a3b8;cursor:pointer;font-family:var(--sans);font-size:13px;text-align:left;display:flex;align-items:center;gap:10px;transition:all .2s;border-left:3px solid transparent}
.nav-btn:hover{background:rgba(255,255,255,.05);color:var(--paper)}
.nav-btn.active{background:rgba(184,134,11,.1);border-left-color:var(--gold);color:var(--gold);font-weight:600}
.sidebar-footer{padding:14px 20px;border-top:1px solid #2d3748;font-size:11px;color:#4a5568;font-family:var(--mono)}
.main{background:var(--paper);overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:2px solid var(--line);padding:13px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:14px;flex-wrap:wrap}
.topbar-title{font-size:16px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.panel{display:none}.panel.active{display:block}
.panel-title{font-size:19px;font-weight:700;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--line)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.field input,.field select{padding:8px 10px;background:var(--surface);border:1px solid var(--line);border-radius:2px;font-family:var(--sans);font-size:13px;color:var(--ink);transition:border-color .2s}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
.btn{padding:8px 16px;border:none;border-radius:2px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .2s}
.btn-primary{background:var(--ink);color:var(--paper)}.btn-primary:hover{background:var(--slate)}
.btn-gold{background:var(--gold);color:white}.btn-outline{background:none;border:1px solid var(--line);color:var(--ink)}.btn-outline:hover{border-color:var(--ink)}
.btn-rust{background:var(--rust);color:white}.btn-rust:hover{background:#a93226}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.table-wrap{border:1px solid var(--line);border-radius:2px;overflow:auto;margin-bottom:18px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--ink);color:var(--paper);padding:8px 11px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:8px 11px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:hover{background:rgba(184,134,11,.04)}
.td-mono{font-family:var(--mono);font-size:12px}
.badge{display:inline-block;padding:2px 6px;border-radius:2px;font-size:11px;font-weight:600;font-family:var(--mono)}
.badge-ok{background:#d4edda;color:#155724}.badge-warn{background:#fff3cd;color:#856404}
.badge-danger{background:#f8d7da;color:#721c24}.badge-muted{background:var(--line);color:var(--muted)}
.alert{padding:11px 15px;border-radius:2px;border-left:4px solid;margin-bottom:12px;font-size:13px;line-height:1.6}
.alert-ok{background:#d4edda;border-color:var(--success);color:#155724}
.alert-warn{background:#fff3cd;border-color:var(--warn);color:#856404}
.alert-danger{background:#f8d7da;border-color:var(--danger);color:#721c24}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--line);padding:13px;border-radius:2px;border-top:3px solid var(--gold)}
.stat-val{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--ink)}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.stat.danger{border-top-color:var(--rust)}.stat.ok{border-top-color:var(--success)}.stat.warn{border-top-color:var(--warn)}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--line);width:92%;max-width:680px;max-height:91vh;overflow-y:auto;border-radius:3px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:14px;font-weight:700}
.modal-head button{background:none;border:none;font-size:21px;cursor:pointer;color:var(--muted);line-height:1;padding:0 3px}
.modal-body{padding:20px}
.modal-foot{padding:13px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}

.bloque{border:1px solid var(--line);border-radius:2px;margin-bottom:14px;overflow:hidden;background:var(--surface)}
.bloque-head{background:var(--ink);color:var(--paper);padding:9px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bloque-body{padding:14px}
.chip{display:inline-flex;align-items:center;gap:3px;background:var(--line);padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600}
.chip.M{background:#bbdefb;color:#0d47a1}.chip.T{background:#c8e6c9;color:#1b5e20}.chip.N{background:#1a1a2e;color:var(--gold)}
.chip.R{background:#ffe0b2;color:#e65100} /* Refuerzo/Traslape */
.chip.P{background:#e1bee7;color:#4a148c} /* Pivote Aseo */

.prog-bar{height:7px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin-top:3px}
.prog-fill{height:100%;border-radius:4px;transition:width .4s}
.prog-ok{background:var(--success)}.prog-warn{background:var(--warn)}.prog-over{background:var(--rust)}

.aus-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:7px;
